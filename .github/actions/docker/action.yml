---
name: Docker Image
description: Creates a Docker Container Image

inputs:
  token:
    description: Github token
    required: true
  push:
    description: Whether to push the built image
    required: false
    default: "false"
  latest:
    description: Also tag the image as latest
    required: false
    default: "false"
  tag-strategy:
    description: Tag strategy (e.g. latest, semver)
    required: false
    default: "latest"

runs:
  using: composite
  steps:
    - name: Generate version from git
      id: version
      shell: bash
      run: |
        if [ "${{ github.ref_type }}" = "tag" ]; then
          echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        elif [ "${{ github.ref_name }}" = "main" ]; then
          echo "version=latest" >> $GITHUB_OUTPUT
        else
          echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        fi

    - name: Set up QEMU
      uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Login to GitHub Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.token }}

    - name: Build and push with Bake
      if: github.event_name != 'pull_request'
      uses: docker/bake-action@d3418bd7d0e9324001bca92fa8ba175ea7e6dc9b # v7.3.0
      env:
        BUILD_DATE: ${{ github.event.head_commit.timestamp }}
        REGISTRY_IMAGE: ghcr.io/${{ github.repository }}
        SOURCE_COMMIT: ${{ github.sha }}
        VERSION: ${{ steps.version.outputs.version }}
      with:
        targets: image-automated
        push: ${{ fromJSON(inputs.push) }}