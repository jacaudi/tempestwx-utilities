version: '3'

tasks:

  build-local:
    desc: Build local Docker image with dynamic labels
    env:
      BUILD_DATE:
        sh: date -u +"%Y-%m-%dT%H:%M:%SZ"
    cmds:
      - docker buildx bake image-local

  ui-build:
    desc: Build the embedded web UI (web/dist), required before `go build`
    dir: web
    cmds:
      - npm ci --ignore-scripts
      - npm run build
